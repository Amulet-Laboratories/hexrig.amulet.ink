[build]
  command = "pnpm build:deploy"
  publish = "packages/site/dist"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9.15.0"

# SPA fallback for Vue Router (if added later)
[[redirects]]
  from = "/storybook/*"
  to = "/storybook/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/storybook/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
